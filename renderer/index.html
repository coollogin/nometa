<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoMeta — очистка метаданных</title>
    <link rel="icon" type="image/x-icon" href="img/favicon.ico">
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1 class="app-title window-drag-text">NoMeta</h1>
            <div class="window-controls">
                <button id="theme-toggle-btn" class="window-btn" title="Переключить тему" type="button">🌙</button>
                <button id="about-btn" class="window-btn" title="О программе" type="button">ℹ</button>
                <button id="minimize-btn" class="window-btn" title="Свернуть" type="button">—</button>
                <button id="close-btn" class="window-btn close" title="Закрыть" type="button">×</button>
            </div>
        </header>

        <main class="main-content">
            <div id="drop-area" class="drop-area">
                <div class="drop-content">
                    <svg class="drop-icon" viewBox="0 0 24 24" width="36" height="36">
                        <path fill="currentColor" d="M20 6h-8l-2-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm0 14H4V8h16v12z"/>
                    </svg>
                    <p class="drop-text">Перетащите папку или файл сюда</p>
                    <div class="drop-buttons">
                        <button id="select-folder-btn" class="select-btn" type="button">Выбрать папку</button>
                        <button id="select-file-btn" class="select-btn" type="button">Выбрать файлы</button>
                    </div>
                </div>
            </div>

            <div id="folder-info" class="folder-info hidden">
                <div class="info-row">
                    <span class="info-label">Найдено:</span>
                    <span id="files-count" class="info-value">0</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Готово:</span>
                    <span id="processed-count" class="info-value">0</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Ошибки:</span>
                    <span id="error-count" class="info-value">0</span>
                </div>
            </div>

            <button id="start-btn" class="action-btn" disabled type="button">Очистить метаданные</button>

            <div id="progress-area" class="progress-area hidden">
                <div class="progress-bar">
                    <div id="progress-fill" class="progress-fill"></div>
                </div>
            </div>
        </main>
    </div>

    <div id="about-modal" class="modal hidden">
        <div class="modal-content">
            <span id="about-close" class="modal-close">&times;</span>
            <h2>NoMeta</h2>
            <p class="about-version">Версия: 1.0.4</p>
            <br>
            <p>Программа для очистки метаданных в офисных документах</p>
            <p class="about-email">Email: houseofcool@ya.ru</p>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
